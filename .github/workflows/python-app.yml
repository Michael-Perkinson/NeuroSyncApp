name: Build and Release NeuroSyncApp

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        shell: cmd
        run: |
          pyinstaller --onefile main.py ^
            --name "NeuroSyncApp_${{ github.ref_name }}" ^
            --icon icon\icon.ico ^
            --distpath "dist" ^
            --collect-all PySide6 ^
            --hidden-import=matplotlib.backends.backend_qtagg ^
            --hidden-import=matplotlib.backends.backend_svg ^
            --hidden-import=matplotlib.backends.backend_ps ^
            --hidden-import=openpyxl ^
            --hidden-import=h5py

      - name: Verify .exe exists
        shell: powershell
        run: |
          $path = "dist\NeuroSyncApp_${{ github.ref_name }}.exe"
          if (Test-Path $path) { Write-Output "Found: $path" }
          else { Write-Error "Not found: $path"; exit 1 }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist\NeuroSyncApp_${{ github.ref_name }}.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          pyinstaller --windowed main.py \
            --name "NeuroSyncApp" \
            --distpath "dist" \
            --collect-all PySide6 \
            --hidden-import=matplotlib.backends.backend_qtagg \
            --hidden-import=matplotlib.backends.backend_svg \
            --hidden-import=matplotlib.backends.backend_ps \
            --hidden-import=openpyxl \
            --hidden-import=h5py

      - name: Create .dmg
        run: |
          hdiutil create -volname "NeuroSyncApp" \
            -srcfolder "dist/NeuroSyncApp.app" \
            -ov -format UDZO \
            "dist/NeuroSyncApp_${{ github.ref_name }}.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/NeuroSyncApp_${{ github.ref_name }}.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            artifacts/NeuroSyncApp_${{ github.ref_name }}.exe \
            artifacts/NeuroSyncApp_${{ github.ref_name }}.dmg \
            --repo ${{ github.repository }} \
            --title "NeuroSyncApp ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}"
