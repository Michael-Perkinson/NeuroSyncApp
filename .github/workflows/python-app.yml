name: Build and Release NeuroSyncApp

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        shell: cmd
        run: |
          pyinstaller --onefile main.py ^
            --name "NeuroSyncApp_${{ github.ref_name }}" ^
            --icon icon\icon.ico ^
            --add-data "src\gui\shared\assets\arrow_down.svg;src\gui\shared\assets" ^
            --distpath "dist" ^
            --collect-all PySide6 ^
            --hidden-import=matplotlib.backends.backend_qtagg ^
            --hidden-import=matplotlib.backends.backend_svg ^
            --hidden-import=matplotlib.backends.backend_ps ^
            --hidden-import=openpyxl ^
            --hidden-import=h5py

      - name: Verify .exe exists
        shell: powershell
        run: |
          $path = "dist\NeuroSyncApp_${{ github.ref_name }}.exe"
          if (Test-Path $path) { Write-Output "Found: $path" }
          else { Write-Error "Not found: $path"; exit 1 }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist\NeuroSyncApp_${{ github.ref_name }}.exe

  build-macos:
    name: build-macos (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-15
            suffix: macos-arm64
          - label: Intel
            runner: macos-15-intel
            suffix: macos-intel

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate macOS icon
        run: |
          python3 - <<'PYEOF'
          from PIL import Image
          import os, subprocess, shutil
          iconset = "/tmp/icon.iconset"
          os.makedirs(iconset, exist_ok=True)
          img = Image.open("icon/icon.ico").convert("RGBA")
          for s in [16, 32, 128, 256, 512]:
              img.resize((s, s), Image.LANCZOS).save(f"{iconset}/icon_{s}x{s}.png")
              img.resize((s * 2, s * 2), Image.LANCZOS).save(f"{iconset}/icon_{s}x{s}@2x.png")
          subprocess.run(["iconutil", "-c", "icns", iconset, "-o", "icon/icon.icns"], check=True)
          shutil.rmtree(iconset)
          PYEOF

      - name: Build macOS app
        run: |
          pyinstaller --windowed main.py \
            --name "NeuroSyncApp" \
            --icon icon/icon.icns \
            --add-data "src/gui/shared/assets/arrow_down.svg:src/gui/shared/assets" \
            --distpath "dist" \
            --collect-all PySide6 \
            --hidden-import=matplotlib.backends.backend_qtagg \
            --hidden-import=matplotlib.backends.backend_svg \
            --hidden-import=matplotlib.backends.backend_ps \
            --hidden-import=openpyxl \
            --hidden-import=h5py

      - name: Prepare macOS DMG contents
        run: |
          mkdir -p "dist/dmg-root"
          cp -R "dist/NeuroSyncApp.app" "dist/dmg-root/"
          cat > "dist/dmg-root/NeuroSyncApp Debug.command" <<'EOF'
          #!/bin/bash
          cd "$(dirname "$0")" || exit 1

          echo "Launching NeuroSyncApp debug runner"
          echo "macOS: $(sw_vers -productVersion)"
          echo "Machine: $(uname -m)"
          echo "Build: ${{ matrix.label }}"
          echo
          echo "Bundled executable:"
          /usr/bin/file "./NeuroSyncApp.app/Contents/MacOS/NeuroSyncApp" || true
          echo
          echo "Application output:"
          echo "-------------------"
          "./NeuroSyncApp.app/Contents/MacOS/NeuroSyncApp"
          status=$?
          echo "-------------------"
          echo
          echo "NeuroSyncApp exited with status $status"
          echo "Copy the output above when reporting a startup crash."
          echo
          read -r -p "Press Return to close this window."
          exit "$status"
          EOF
          chmod +x "dist/dmg-root/NeuroSyncApp Debug.command"
          /usr/bin/file "dist/dmg-root/NeuroSyncApp.app/Contents/MacOS/NeuroSyncApp"

      - name: Create .dmg
        run: |
          hdiutil create -volname "NeuroSyncApp" \
            -srcfolder "dist/dmg-root" \
            -ov -format UDZO \
            "dist/NeuroSyncApp_${{ github.ref_name }}_${{ matrix.suffix }}.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.suffix }}
          path: dist/NeuroSyncApp_${{ github.ref_name }}_${{ matrix.suffix }}.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-dmg-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            artifacts/NeuroSyncApp_${{ github.ref_name }}.exe \
            artifacts/NeuroSyncApp_${{ github.ref_name }}_macos-arm64.dmg \
            artifacts/NeuroSyncApp_${{ github.ref_name }}_macos-intel.dmg \
            --repo ${{ github.repository }} \
            --title "NeuroSyncApp ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}"
